name: Update dataset

on:
  schedule:
    - cron: "15 8 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and clean data
        run: python scripts/fetch_flourish.py

      - name: Commit changes
        run: |
          git config user.name "dataset-bot"
          git config user.email "dataset-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update dataset snapshot"
          git push
